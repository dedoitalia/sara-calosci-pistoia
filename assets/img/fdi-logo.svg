<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sara Calosci — Fratelli d'Italia Pistoia">
  <title>Sara Calosci — Fratelli d'Italia · Pistoia</title>
  <desc>Stemma della campagna elettorale di Sara Calosci, candidata al Consiglio Comunale di Pistoia con Fratelli d'Italia. Elezioni amministrative 24-25 maggio 2026.</desc>

  <defs>
    <!-- path per il testo curvo in alto -->
    <path id="arc-top" d="M 76 256 A 180 180 0 0 1 436 256" fill="none"/>
    <!-- clip al cerchio interno -->
    <clipPath id="inner-circle">
      <circle cx="256" cy="256" r="238"/>
    </clipPath>
    <!-- clip del cuore, per i tre colori -->
    <clipPath id="heart-clip">
      <path d="M 256 446
               C 198 408 160 374 160 348
               C 160 328 175 318 196 318
               C 220 318 240 335 256 358
               C 272 335 292 318 316 318
               C 337 318 352 328 352 348
               C 352 374 314 408 256 446 Z"/>
    </clipPath>
    <!-- ombra morbida interna -->
    <radialGradient id="inner-shade" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#12315a"/>
      <stop offset="100%" stop-color="#0b2545"/>
    </radialGradient>
  </defs>

  <!-- bordo esterno navy + anello bianco -->
  <circle cx="256" cy="256" r="252" fill="#0b2545"/>
  <circle cx="256" cy="256" r="246" fill="#ffffff"/>
  <circle cx="256" cy="256" r="238" fill="url(#inner-shade)"/>

  <g clip-path="url(#inner-circle)">
    <!-- pannello bianco in basso -->
    <rect x="0" y="320" width="512" height="220" fill="#ffffff"/>

    <!-- fascia tricolore orizzontale sopra il pannello bianco -->
    <rect x="0" y="308" width="170" height="12" fill="#009246"/>
    <rect x="170" y="308" width="172" height="12" fill="#ffffff"/>
    <rect x="342" y="308" width="170" height="12" fill="#ce2b37"/>

    <!-- cuore tricolore (sostituisce la fiamma) -->
    <g clip-path="url(#heart-clip)">
      <rect x="152" y="310" width="72" height="150" fill="#009246"/>
      <rect x="224" y="310" width="64" height="150" fill="#ffffff"/>
      <rect x="288" y="310" width="72" height="150" fill="#ce2b37"/>
    </g>
    <!-- profilo del cuore -->
    <path d="M 256 446
             C 198 408 160 374 160 348
             C 160 328 175 318 196 318
             C 220 318 240 335 256 358
             C 272 335 292 318 316 318
             C 337 318 352 328 352 348
             C 352 374 314 408 256 446 Z"
          fill="none" stroke="#0b2545" stroke-width="3"/>

    <!-- testo curvo in alto: FRATELLI d'ITALIA -->
    <text font-family="Poppins, 'Inter', 'Helvetica', sans-serif" font-weight="700" fill="#ffffff" font-size="36" letter-spacing="4">
      <textPath href="#arc-top" startOffset="50%" text-anchor="middle">FRATELLI d'ITALIA</textPath>
    </text>

    <!-- blocco centrale: SARA CALOSCI -->
    <g text-anchor="middle" font-family="Poppins, 'Inter', 'Helvetica', sans-serif">
      <text x="256" y="192" font-size="56" font-weight="700" fill="#f5c043" letter-spacing="1">SARA</text>
      <text x="256" y="256" font-size="56" font-weight="700" fill="#f5c043" letter-spacing="1">CALOSCI</text>
      <text x="256" y="292" font-size="16" font-weight="500" fill="#ffffff" letter-spacing="6">PISTOIA · 2026</text>
    </g>
  </g>

  <!-- ring esterno (copre l'interno del cerchio bianco) -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="#0b2545" stroke-width="2"/>
</svg>
