<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Fratelli d'Italia">
  <title>Fratelli d'Italia</title>
  <defs>
    <!-- Clip per tenere il contenuto dentro il cerchio -->
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="186"/>
    </clipPath>
  </defs>

  <!-- Cerchio esterno blu navy con bordo bianco -->
  <circle cx="200" cy="200" r="198" fill="#0b2550"/>
  <circle cx="200" cy="200" r="192" fill="none" stroke="#ffffff" stroke-width="6"/>
  <circle cx="200" cy="200" r="186" fill="#0b2550"/>

  <g clip-path="url(#circle-clip)">
    <!-- "FRATELLI" -->
    <text x="200" y="120" text-anchor="middle"
          font-family="'Helvetica Neue','Arial Narrow',Arial,sans-serif"
          font-size="46" font-weight="800" fill="#ffffff"
          letter-spacing="1"
          textLength="220" lengthAdjust="spacingAndGlyphs">FRATELLI</text>

    <!-- "d'ITALIA" in stile corsivo -->
    <text x="200" y="175" text-anchor="middle"
          font-family="Georgia,'Times New Roman',serif"
          font-style="italic" font-size="54" font-weight="700" fill="#ffffff"
          letter-spacing="0.5"
          textLength="220" lengthAdjust="spacingAndGlyphs">d&apos;ITALIA</text>

    <!-- Barre tricolore orizzontali (separatore) -->
    <g>
      <rect x="40"  y="196" width="110" height="3" fill="#009246"/>
      <rect x="40"  y="204" width="110" height="3" fill="#ce2b37"/>
      <rect x="250" y="196" width="110" height="3" fill="#009246"/>
      <rect x="250" y="204" width="110" height="3" fill="#ce2b37"/>
    </g>

    <!-- Semicerchio bianco (la "coppa" sotto il testo) -->
    <!-- Bordo bianco sottile + area bianca interna -->
    <path d="M 70 212 A 130 130 0 0 0 330 212 L 330 390 L 70 390 Z" fill="#ffffff"/>
    <!-- Ritaglio interno per ricreare l'effetto "contenitore" — lasciamo il bianco pieno per semplicità -->

    <!-- Fiamma tricolore -->
    <g transform="translate(200,295)">
      <!-- Verde (sinistra) -->
      <path d="M -4 -62
               C -30 -48, -42 -20, -36 4
               C -30 26, -16 38, -10 46
               C -10 34, -6 22, 0 12
               C 0 2, -2 -12, -2 -30
               C -2 -44, -4 -54, -4 -62 Z"
            fill="#009246"/>
      <!-- Bianco (centro) -->
      <path d="M 0 -58
               C -16 -44, -24 -20, -18 4
               C -14 22, -6 32, 0 44
               C 6 32, 14 22, 18 4
               C 24 -20, 16 -44, 0 -58 Z"
            fill="#f4f4f4"/>
      <!-- Rosso (destra) -->
      <path d="M 4 -62
               C 30 -48, 42 -20, 36 4
               C 30 26, 16 38, 10 46
               C 10 34, 6 22, 0 12
               C 0 2, 2 -12, 2 -30
               C 2 -44, 4 -54, 4 -62 Z"
            fill="#ce2b37"/>
    </g>

    <!-- Piccola barretta blu/grigio sotto la fiamma, come nel logo -->
    <rect x="175" y="346" width="50" height="4" fill="#0b2550"/>
  </g>
</svg>
