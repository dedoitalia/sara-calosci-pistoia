services:
  - type: web
    name: sara-calosci-pistoia
    runtime: static
    buildCommand: "echo 'Static site — nothing to build.'"
    staticPublishPath: ./
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
